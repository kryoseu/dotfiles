background {
    monitor =
    # path = screenshot
    blue_passes = 5
    blur_size = 95
    noise = 0.5
    color = rgba(20, 20, 20, 1.0)
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(255, 255, 255, 0.9)
    font_size = 90
    font_family = JetBrainsMono
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%A, %d %B %Y")</span>"
    color = rgba(255, 255, 255, 0.6)
    font_size = 20
    font_family = JetBrainsMono
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>Welcome ~/, $(whoami)</span>"
    color = rgba(255, 255, 255, 0.6)
    font_size = 20
    font_family = JetBrainsMono
    position = 0, -50
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgba(255, 255, 255, 1.0)
    inner_color = rgba(20, 20, 20, 1.0)
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = false
    placeholder_text = <i>Password</i>
    position = 0, -100
    halign = center
    valign = center
    rounding = 0
}
